<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie — System Zarządzania</title>
    <meta name="description" content="Bezpieczne logowanie do systemu zarządzania inwestycjami deweloperskimi.">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline';">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #0f1117;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animowane tło */
        .bg-glow {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 60% 50% at 20% 40%, rgba(99,102,241,0.15) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 80% 60%, rgba(168,85,247,0.12) 0%, transparent 70%);
        }

        .login-wrapper {
            position: relative; z-index: 1;
            width: 100%; max-width: 420px;
            padding: 20px;
        }

        .brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand-icon {
            width: 52px; height: 52px;
            background: #000;
            border-radius: 14px;
            display: inline-flex; align-items: center; justify-content: center;
            overflow: hidden;
            margin-bottom: 12px;
            box-shadow: 0 8px 24px rgba(99,102,241,0.4);
        }
        .brand-icon img { width: 100%; height: 100%; object-fit: cover; }
        .brand-name {
            font-size: 22px; font-weight: 700;
            color: #f1f5f9;
            letter-spacing: -0.5px;
        }
        .brand-sub {
            font-size: 13px; color: #64748b; margin-top: 3px;
        }

        .login-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 36px 32px;
            backdrop-filter: blur(20px);
            box-shadow: 0 24px 48px rgba(0,0,0,0.4);
        }

        .card-title {
            font-size: 18px; font-weight: 600; color: #f1f5f9;
            margin-bottom: 24px;
            text-align: center;
        }

        .field-group { margin-bottom: 16px; }
        .field-label {
            display: block;
            font-size: 11px; font-weight: 600;
            color: #94a3b8;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .field-input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #f1f5f9;
            font-size: 14px; font-family: inherit;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .field-input::placeholder { color: #475569; }
        .field-input:focus {
            border-color: rgba(99,102,241,0.6);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }
        .field-input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px #1e1f2e inset;
            -webkit-text-fill-color: #f1f5f9;
        }

        .error-msg {
            display: none;
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-align: center;
        }

        .btn-login {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white; border: none; border-radius: 10px;
            font-size: 14px; font-weight: 600; font-family: inherit;
            cursor: pointer; letter-spacing: 0.5px;
            margin-top: 8px;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(99,102,241,0.35);
        }
        .btn-login:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.45); }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .footer-note {
            text-align: center; margin-top: 20px;
            font-size: 12px; color: #334155;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.35s ease; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="login-wrapper">
        <div class="brand">
            <div class="brand-icon"><img src="logo.png" alt="Logo"></div>
            <div class="brand-name">Architektura dialogu</div>
            <div class="brand-sub">System Zarządzania Inwestycjami</div>
        </div>

        <div class="login-card">
            <div class="card-title">Zaloguj się</div>
            <div id="error" class="error-msg"></div>
            <form id="loginForm" onsubmit="event.preventDefault(); doLogin();">
                <div class="field-group">
                    <label class="field-label" for="login">E-mail / Login</label>
                    <input type="text" id="login" class="field-input"
                        placeholder="adres@firma.pl" autocomplete="username" required>
                </div>
                <div class="field-group">
                    <label class="field-label" for="pass">Hasło</label>
                    <input type="password" id="pass" class="field-input"
                        placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <button type="submit" id="btn-login" class="btn-login">ZALOGUJ SIĘ</button>
            </form>
        </div>

        <div class="footer-note">System v3.0 &bull; Dostęp chroniony SSL</div>
    </div>

    <script>
        async function doLogin() {
            const loginVal = document.getElementById('login').value.trim();
            const password = document.getElementById('pass').value;
            const errorDiv = document.getElementById('error');
            const btn = document.getElementById('btn-login');

            errorDiv.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Weryfikacja...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login: loginVal, password })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    window.location.href = data.redirectUrl || '/dashboard.html';
                } else {
                    throw new Error(data.message || 'Błędny login lub hasło');
                }
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
                document.querySelector('.login-card').classList.add('shake');
                setTimeout(() => document.querySelector('.login-card').classList.remove('shake'), 400);
            } finally {
                btn.disabled = false;
                btn.textContent = 'ZALOGUJ SIĘ';
            }
        }
    </script>
</body>
</html>
